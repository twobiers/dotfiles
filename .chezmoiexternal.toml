{{- if eq .chezmoi.os "linux" }}
[".local/bin/age"]
    type = "archive-file"
    url = {{ gitHubLatestReleaseAssetURL "FiloSottile/age" (printf "age-*-%s-%s.tar.gz" .chezmoi.os .chezmoi.arch) | quote }}
    executable = true
    path = "age/age"

[".local/bin/age-keygen"]
    type = "archive-file"
    url = {{ gitHubLatestReleaseAssetURL "FiloSottile/age" (printf "age-*-%s-%s.tar.gz" .chezmoi.os .chezmoi.arch) | quote }}
    executable = true
    path = "age/age-keygen"

[".local/bin/starship"]
    type = "archive-file"
    url = {{ gitHubLatestReleaseAssetURL "starship/starship" "starship-x86_64-unknown-linux-musl.tar.gz" | quote }}
    executable = true
    path = "starship"

[".local/share/znap"]
    type = "git-repo"
    url = "https://github.com/marlonrichert/zsh-snap.git"
    refreshPeriod = "168h"

[".local/share/fubectl/fubectl.source"]
    type = "file"
    url = "https://raw.githubusercontent.com/kubermatic/fubectl/refs/heads/main/fubectl.source"
    refreshPeriod = "168h"

[".local/share/nano-syntax-highlighting"]
    type = "git-repo"
    url = "https://github.com/galenguyer/nano-syntax-highlighting"
    refreshPeriod = "168h"
{{- end }}

{{- $fontDir := "" }}
{{- if eq .chezmoi.os "linux" }}
{{-   $fontDir = ".local/share/fonts" }}
{{- end }}

{{- if ne "{{ $fontDir }}" "" }}
["{{ $fontDir }}/Jetbrains Mono NF Regular.ttf"]
    type = "file"
    url = "https://github.com/ryanoasis/nerd-fonts/blob/master/patched-fonts/JetBrainsMono/Ligatures/Regular/JetBrainsMonoNerdFont-Regular.ttf?raw=true"
    refreshPeriod = "168h"

["{{ $fontDir }}/Jetbrains Mono NF Bold.ttf"]
    type = "file"
    url = "https://github.com/ryanoasis/nerd-fonts/blob/master/patched-fonts/JetBrainsMono/Ligatures/Bold/JetBrainsMonoNerdFont-Bold.ttf?raw=true"
    refreshPeriod = "168h"

["{{ $fontDir }}/Jetbrains Mono NF Italic.ttf"]
    type = "file"
    url = "https://github.com/ryanoasis/nerd-fonts/blob/master/patched-fonts/JetBrainsMono/Ligatures/Italic/JetBrainsMonoNerdFont-Italic.ttf?raw=true"
    refreshPeriod = "168h"

["{{ $fontDir }}/Jetbrains Mono NF BoldItalic.ttf"]
    type = "file"
    url = "https://github.com/ryanoasis/nerd-fonts/blob/master/patched-fonts/JetBrainsMono/Ligatures/BoldItalic/JetBrainsMonoNerdFont-BoldItalic.ttf?raw=true"
    refreshPeriod = "168h"

{{- end }}
