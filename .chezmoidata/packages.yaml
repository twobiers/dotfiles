profiles:
  common:
    apt:
      sources:
        ppas:
          - jdxcode/mise
      packages:
        - git
        - zsh
        - fzf
        - mise
        - podman
        - podman-docker
        - podman-compose
      conditional_packages:
        - when:
            any_installed: [nautilus]
          packages:
            - python3-nautilus

  work:
    apt:
      packages: []

  private:
    apt:
      packages: []
