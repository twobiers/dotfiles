packages:
  profiles:
    common:
      apt:
        sources:
          repos:
            - id: mise
              url: https://mise.jdx.dev/deb
              key_url: https://mise.jdx.dev/gpg-key.pub
              suites: [stable]
              components: [main]
        packages:
          - git
          - zsh
          - fzf
          - mise
          - podman
          - podman-docker
          - podman-compose
          - uidmap # Required for podman
          - passt # Required for podman
          - zoxide
          - jq
          - gh
    desktop:
      apt:
        packages:
          - ghostty
          - easyeffects
        conditional_packages:
          - when:
              any_installed: [nautilus]
            packages:
              - python3-nautilus
    work:
      apt:
        packages: []

    personal:
      apt:
        packages: []
